version: "3.9"

services:
  middleware:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: middleware_marisma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./session.json:/app/session.json
      - ./config.json:/app/config.json
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: "info"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - marisma_network

networks:
  marisma_network:
    driver: bridge
